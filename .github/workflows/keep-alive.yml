name: Keep Alive

on:
  schedule:
    - cron: '3-59/10 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    name: Ping health endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Curl health endpoint with retries
        shell: bash
        run: |
          set -euo pipefail
          URL="https://lens.sideby.me/_health"
          echo "Pinging $URL"
          for attempt in {1..6}; do
            HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 45 --connect-timeout 15 -H "User-Agent: keep-alive-bot/1.0" "$URL" || echo "000")
            echo "Attempt ${attempt}: HTTP ${HTTP_STATUS}"
            if [[ "$HTTP_STATUS" =~ ^2|3[0-9]{2}$ ]] || { [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; }; then
              echo "Health check OK"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after retries"
          exit 1
